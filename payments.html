<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Virements - Cryptex Bank</title>
  <link rel="shortcut icon" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="payments">
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Virements</h1>
        <p class="small">Envoie de l’argent à un autre client Cryptex Bank.</p>
      </div>
      <button id="logoutBtn" class="secondary">Se déconnecter</button>
    </div>

    <div class="card hero-card">
      <p class="small">Solde courant</p>
      <h2 id="paymentBalance">0 €</h2>
      <p class="small" id="myIban">IBAN : chargement...</p>
    </div>

    <div class="card">
      <h3>Faire un virement</h3>

      <input id="receiverIban" type="text" placeholder="IBAN du bénéficiaire">
      <input id="transferAmount" type="number" min="1" placeholder="Montant">
      <input id="transferReason" type="text" placeholder="Motif du virement">

      <button id="sendTransferBtn">Envoyer le virement</button>
    </div>

    <div class="card">
      <h3>Contacts</h3>

      <input id="contactName" type="text" placeholder="Nom du contact">
      <input id="contactIban" type="text" placeholder="IBAN du contact">

      <button id="addContactBtn">Ajouter le contact</button>

      <div id="contactsList" style="margin-top:14px;"></div>
    </div>

    <div class="card">
      <h3>Historique des virements</h3>
      <div id="paymentsHistory"></div>
    </div>
  </div>

  <nav>
    <a href="home.html"><span>🏠</span><small>Accueil</small></a>
    <a href="payments.html"><span>💸</span><small>Virements</small></a>
    <a href="cards.html"><span>💳</span><small>Cartes</small></a>
    <a href="markets.html"><span>📊</span><small>Marchés</small></a>
    <a href="casino.html"><span>🎰</span><small>Casino</small></a>
    <a href="profile.html"><span>👤</span><small>Profil</small></a>
    <a id="adminNavLink" href="admin.html" style="display:none;"><span>🛡️</span><small>Admin</small></a>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
