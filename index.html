<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Connexion - Cryptex Bank</title>
  <link rel="shortcut icon" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h1>Cryptex Bank</h1>
      <p class="small">Simulation bancaire réaliste</p>

      <input id="displayName" type="text" placeholder="Prénom / Nom">
      <div id="businessAccountCard" class="account-type-card">
        <div class="account-type-header">
          <div>
            <h4>🏢 Compte Entreprise</h4>
            <p>Accès aux outils professionnels</p>
          </div>

          <input id="isBusinessAccount" type="checkbox">
        </div>

        <ul>
          <li>📊 Tableau de bord entreprise</li>
          <li>📈 Revenus & dépenses mensuels</li>
          <li>🏦 Futurs prêts professionnels</li>
          <li>👨‍💼 Conseiller entreprise dédié</li>
        </ul>

        <div class="account-type-badge">
          Professionnel
        </div>
      </div>

      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Mot de passe">

      <button id="loginBtn">Se connecter</button>
      <button id="registerBtn" class="secondary">Créer un compte</button>
      <button id="googleBtn" class="secondary">Continuer avec Google</button>
      <button id="resetBtn" class="link-btn">Mot de passe oublié</button>

      <p id="statusMsg" class="small"></p>
    </div>
  </div>

  <script type="module">
    import { registerUser, loginUser, loginWithGoogle, resetPassword, watchAuth } from "./js/auth.js";
    import { createUserProfile, getUserProfile } from "./js/db.js";
    console.log("SCRIPT INDEX CHARGÉ");

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const statusMsg = document.getElementById("statusMsg");
    const displayNameInput = document.getElementById("displayName");
    const isBusinessAccountInput = document.getElementById("isBusinessAccount");

    function generateIban() {
      const nums = Array.from({ length: 23 }, () => Math.floor(Math.random() * 10)).join("");
      return "FR76" + nums;
    }

    function createDefaultProfile(user) {
      const name = displayNameInput.value.trim() || user.displayName || user.email.split("@")[0];
      const isBusiness = isBusinessAccountInput.checked;

      return {
        email: user.email,
        username: name,
        displayName: name,
        createdAt: Date.now(),
        isAdmin: false,

        accounts: {
          courant: 1000,
          epargne: 0
        },

        activeAccount: "courant",
        iban: generateIban(),

        card: {
          type: "classic",
          pin: null,
          blocked: false
        },
        cardBlocked: false,
        notifications: [],
        advisorMessages: [],

        xp: 0,
        history: ["Compte créé avec 1 000 € offerts"],

        loans: [],
        contacts: [],
        investments: {},
        realEstate: {},
        crypto: {
          currentAsset: "BTC",
          assets: {}
        },

        transactions: [],
        lastRealEstateIncome: Date.now(),
        lastBankFeePayment: Date.now(),

        creditScore: 500,
        lastLoanPaymentCheck: Date.now(),

        isBusiness,
        advisor: isBusiness ? "Camille Martin — Conseiller entreprise" : "Camille Martin",
        agency: {
          advisor: isBusiness ? "Camille Martin — Conseiller entreprise" : "Camille Martin",
          phone: "05 56 65 15 94",
          email: "conseiller@cryptex-bank.fr",
          name: "Cryptex Bank Bordeaux",
          address: "10 cours de l’Intendance, 33000 Bordeaux",
          hours: "Lun - Ven : 9h00 - 18h00 et Sam - Dim : 10h00 - 16h00"
        },

        lastInterestPayment: Date.now(),
        lastTaxPayment: Date.now()
      };
    }

    const businessCheckbox =
      document.getElementById("isBusinessAccount");

    const businessCard =
      document.getElementById("businessAccountCard");

    if (businessCheckbox && businessCard) {

      businessCheckbox.addEventListener("change", () => {

        businessCard.classList.toggle(
          "active",
          businessCheckbox.checked
        );

      });

    }

    async function ensureProfile(user) {
      console.log("USER UID :", user.uid);

      const existing = await getUserProfile(user.uid);
      console.log("PROFIL EXISTANT :", existing);

      if (!existing) {
        const profile = createDefaultProfile(user);
        console.log("CREATION PROFIL :", profile);

        await createUserProfile(user.uid, profile);

        console.log("PROFIL CREE DANS FIRESTORE");
      }
    }
    
    document.getElementById("registerBtn").onclick = async () => {
      console.log("CLIC CREER COMPTE");

      try {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        console.log("EMAIL :", email);

        if (!email || !password) {
          statusMsg.innerText = "Email et mot de passe obligatoires.";
          return;
        }

        const cred = await registerUser(email, password);
        console.log("COMPTE AUTH CREE :", cred.user.uid);

        await ensureProfile(cred.user);
        console.log("PROFIL FIRESTORE OK");

        window.location.href = "home.html";
      } catch (e) {
        console.error("ERREUR CREATION COMPTE :", e);
        statusMsg.innerText = e.message;
      }
    };

    document.getElementById("loginBtn").onclick = async () => {
      try {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) return statusMsg.innerText = "Email et mot de passe obligatoires.";

        await loginUser(email, password);
        window.location.href = "home.html";
      } catch (e) {
        statusMsg.innerText = e.message;
      }
    };

    document.getElementById("googleBtn").onclick = async () => {
      try {
        const cred = await loginWithGoogle();
        await ensureProfile(cred.user);
        window.location.href = "home.html";
      } catch (e) {
        statusMsg.innerText = e.message;
      }
    };

    document.getElementById("resetBtn").onclick = async () => {
      try {
        const email = emailInput.value.trim();
        if (!email) return statusMsg.innerText = "Entre ton email.";
        await resetPassword(email);
        statusMsg.innerText = "Email de réinitialisation envoyé.";
      } catch (e) {
        statusMsg.innerText = e.message;
      }
    };
  </script>
</body>
</html>
