<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banque - Cryptex Bank</title>
<link rel="shortcut icon" href="img/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>

<body data-page="bank">

<div class="container">

  <div class="topbar">
    <div>
      <h1>🏦 Banque</h1>
      <p class="small">Prêts et crédits</p>
    </div>
  </div>

  <div class="card">
    <h3>Contracter un prêt</h3>

  <div class="loan-types">

    <div class="loan-type-card active" data-loan="student">
      🎓
      <h4>Étudiant</h4>
      <p>1.5%</p>
      <small>Jusqu'à 15 000€</small>
    </div>

    <div class="loan-type-card" data-loan="auto">
      🚗
      <h4>Auto</h4>
      <p>3%</p>
      <small>Jusqu'à 50 000€</small>
    </div>

    <div class="loan-type-card" data-loan="realestate">
      🏠
      <h4>Immobilier</h4>
      <p>2%</p>
      <small>Jusqu'à 500 000€</small>
    </div>

    <div class="loan-type-card" data-loan="consumer">
      💳
      <h4>Consommation</h4>
      <p>6%</p>
      <small>Jusqu'à 10 000€</small>
    </div>

  </div>

  <input id="selectedLoanType" type="hidden" value="student">

    <input id="loanAmount" type="number" placeholder="Montant">

    <input id="loanDuration" type="number" placeholder="Durée (mois)">

    <button id="takeLoanBtn">
      Demander le prêt
    </button>
  </div>

  <div class="card">
    <h3>Mes prêts</h3>

    <div id="loansList"></div>
  </div>

</div>
